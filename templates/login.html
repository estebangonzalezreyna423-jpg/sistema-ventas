<!DOCTYPE html>
<html>
<head>
    <title>Login - Sistema de Ventas</title>

    <style>
        body {
            margin: 0;
            font-family: "Agency FB", Arial, sans-serif;
            height: 100vh;
            display: flex;
        }

        /* 🔵 LADO IZQUIERDO */
        .left {
            width: 60%;
            background: linear-gradient(135deg, #1e3a8a, #1e40af);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .left h1 {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .left p {
            font-size: 20px;
            width: 70%;
        }

        /* ⚪ LADO DERECHO */
        .right {
            width: 40%;
            background: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: #f9fafb;
            padding: 40px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        .login-box h2 {
            font-size: 30px;
            margin-bottom: 25px;
            color: #0f172a;
            font-weight: bold;
        }

        /* INPUTS */
        .input-group {
            margin-bottom: 15px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-size: 16px;
            background: #f1f5f9;
            text-align: center;
        }

        .input-group input:focus {
            outline: none;
            border: 1px solid #1e3a8a;
            box-shadow: 0 0 6px rgba(30,58,138,0.4);
        }

        /* BOTÓN */
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-login:hover {
            background: #1e40af;
            transform: scale(1.05);
        }

        /* ERROR */
        .error {
            color: red;
            margin-bottom: 10px;
            font-size: 14px;
        }

    </style>
</head>

<body>

    <!-- IZQUIERDA -->
    <div class="left">
        <div>
            <h1>SISTEMA DE VENTAS</h1>
            <p>Controla inventario, ventas y rendimiento de cada PC en tiempo real.</p>
        </div>
    </div>

    <!-- DERECHA -->
    <div class="right">
        <div class="login-box">

            <h2>INICIAR SESIÓN</h2>

            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

            <form method="POST">

                <div class="input-group">
                    <input type="text" name="usuario" placeholder="Usuario (pc1, pc2...)" required>
                </div>

                <div class="input-group">
                    <input type="password" name="password" placeholder="Contraseña" required>
                </div>

                <button type="submit" class="btn-login">INGRESAR</button>

            </form>

        </div>
    </div>

</body>
</html>
