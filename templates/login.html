<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema de Ventas</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Agency FB", "Segoe UI", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
        }

        /* LADO IZQUIERDO */
        .left {
            position: relative;
            width: 60%;
            height: 100vh;
            overflow: hidden;
            background: #1e3a8a;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slider {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        .slides {
            display: flex;
            width: 200%;
            height: 100%;
            animation: moverSlider 12s infinite ease-in-out;
        }

        .slides img {
            width: 50%;
            height: 100%;
            object-fit: cover;
        }

        .left::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.58);
            z-index: 1;
        }

        .left-content {
            position: relative;
            z-index: 2;
            color: white;
            text-align: center;
            max-width: 520px;
            padding: 20px;
        }

        .left-content h1 {
            font-size: 46px;
            font-weight: bold;
            margin-bottom: 14px;
            letter-spacing: 1px;
        }

        .left-content p {
            font-size: 22px;
            line-height: 1.4;
            margin: 0 auto;
            width: 85%;
        }

        @keyframes moverSlider {
            0% { transform: translateX(0); }
            40% { transform: translateX(0); }
            50% { transform: translateX(-50%); }
            90% { transform: translateX(-50%); }
            100% { transform: translateX(0); }
        }

        /* LADO DERECHO */
        .right {
            width: 40%;
            background: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: #f9fafb;
            padding: 40px;
            border-radius: 16px;
            width: 330px;
            box-shadow: 0px 15px 35px rgba(0,0,0,0.22);
            text-align: center;
        }

        .login-box h2 {
            font-size: 31px;
            margin-bottom: 25px;
            color: #0f172a;
            font-weight: bold;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group input {
            width: 100%;
            padding: 13px;
            border-radius: 9px;
            border: 1px solid #cbd5e1;
            font-size: 16px;
            background: #f1f5f9;
            text-align: center;
        }

        .input-group input:focus {
            outline: none;
            border: 1px solid #1e3a8a;
            box-shadow: 0 0 8px rgba(30,58,138,0.35);
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: #1e3a8a;
            color: white;
            border: none;
            border-radius: 9px;
            font-size: 19px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.25s;
        }

        .btn-login:hover {
            background: #1e40af;
            transform: translateY(-2px);
        }

        .error {
            color: #dc2626;
            margin-bottom: 10px;
            font-size: 14px;
        }

        @media (max-width: 850px) {
            body {
                flex-direction: column;
            }

            .left,
            .right {
                width: 100%;
            }

            .left {
                height: 45vh;
            }

            .right {
                min-height: 55vh;
            }

            .left-content h1 {
                font-size: 34px;
            }

            .left-content p {
                font-size: 17px;
            }
        }
    </style>
</head>

<body>

    <div class="left">
        <div class="slider">
            <div class="slides">
                <img src="https://scontent.flim37-1.fna.fbcdn.net/v/t39.30808-6/594096296_122113399983078210_7565102985565082261_n.jpg?_nc_cat=105&ccb=1-7&_nc_sid=2a1932&_nc_eui2=AeHUkeA6mQsSc2hIktF7usgYYGCbgGnw-MdgYJuAafD4xyfRZq6rRJHuwbvTCm5D5GFveN0WUZ-Xsm0t3iK2oc7S&_nc_ohc=p8T08UfUMw4Q7kNvwEOcTKa&_nc_oc=Adqd4LAkRsI-pIKDIvbIYhnnyWaHWt3bPWSKrFT_Rn5yw8fbkwvIn1hB7VHfB2rRIyCulV9RIQd2lYjtNXgcJM0p&_nc_zt=23&_nc_ht=scontent.flim37-1.fna&_nc_gid=qTpKlaLVOX7bnSO5lL9dAw&_nc_ss=7b2a8&oh=00_Af2-M2a1KMIvGWLrM3u9kkwfnyX17aq7M1z43SM3zzKzAQ&oe=69F8A395">
                <img src="https://unitru.edu.pe/webfiles///Noticia/2026/1//0_Noticia_300120260245.jpg">
            </div>
        </div>

        <div class="left-content">
            <h1>SISTEMA DE VENTAS</h1>
            <p>Controla inventario, ventas y rendimiento de cada PC en tiempo real.</p>
        </div>
    </div>

    <div class="right">
        <div class="login-box">

            <h2>INICIAR SESIÓN</h2>

            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <div class="input-group">
                    <input type="text" name="usuario" placeholder="Usuario (pc1, pc2...)" required>
                </div>

                <div class="input-group">
                    <input type="password" name="password" placeholder="Contraseña" required>
                </div>

                <button type="submit" class="btn-login">INGRESAR</button>
            </form>

        </div>
    </div>

</body>
</html>
