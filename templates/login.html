<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - Sistema de Ventas</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "Agency FB", "Segoe UI", Arial, sans-serif;
    min-height: 100vh;
    display: flex;
}

/* IZQUIERDA */
.left {
    position: relative;
    width: 60%;
    height: 100vh;
    background-image:
        linear-gradient(rgba(15, 23, 42, 0.58), rgba(15, 23, 42, 0.58)),
        url("https://unitru.edu.pe/webfiles///Noticia/2026/1//0_Noticia_300120260245.jpg");
    background-size: cover;
    background-position: center;
    display: flex;
    justify-content: center;
    align-items: center;
}

.left-content {
    color: white;
    text-align: center;
    max-width: 540px;
    padding: 25px;
}

.left-content h1 {
    font-size: 48px;
    margin-bottom: 14px;
    letter-spacing: 1px;
}

.left-content p {
    font-size: 22px;
    line-height: 1.4;
}

/* DERECHA */
.right {
    width: 40%;
    background: linear-gradient(135deg, #e5e7eb, #f8fafc);
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(10px);
    padding: 42px;
    border-radius: 22px;
    width: 360px;
    box-shadow: 0 20px 45px rgba(15,23,42,0.22);
    text-align: center;
    border: 1px solid rgba(203,213,225,0.8);
}

.login-box h2 {
    font-size: 32px;
    margin-bottom: 8px;
    color: #0f172a;
}

.login-box .subtitulo {
    margin-bottom: 25px;
    color: #64748b;
    font-family: "Segoe UI", Arial, sans-serif;
    font-size: 14px;
}

.input-group {
    margin-bottom: 16px;
    text-align: left;
}

.input-group label {
    display: block;
    margin-bottom: 7px;
    color: #334155;
    font-family: "Segoe UI", Arial, sans-serif;
    font-weight: 700;
    font-size: 13px;
}

.input-wrap {
    display: flex;
    align-items: center;
    background: #f1f5f9;
    border: 1px solid #cbd5e1;
    border-radius: 13px;
    padding: 0 12px;
    transition: 0.25s;
}

.input-wrap span {
    font-family: "Segoe UI", Arial, sans-serif;
    color: #64748b;
    margin-right: 8px;
}

.input-wrap input {
    width: 100%;
    padding: 14px 5px;
    border: none;
    outline: none;
    background: transparent;
    font-size: 15px;
    color: #0f172a;
}

.input-wrap:focus-within {
    border-color: #2563eb;
    box-shadow: 0 0 0 4px rgba(37,99,235,0.12);
    background: #ffffff;
}

.btn-login {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #2563eb, #1e3a8a);
    color: white;
    border: none;
    border-radius: 13px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.25s;
    box-shadow: 0 10px 22px rgba(37,99,235,0.28);
}

.btn-login:hover {
    transform: translateY(-2px);
    filter: brightness(1.08);
}

.error {
    color: #dc2626;
    margin-bottom: 12px;
    font-family: "Segoe UI", Arial, sans-serif;
    font-size: 14px;
}

@media (max-width: 850px) {
    body { flex-direction: column; }
    .left, .right { width: 100%; }
    .left { height: 42vh; }
    .right { min-height: 58vh; }
    .left-content h1 { font-size: 34px; }
    .left-content p { font-size: 17px; }
}
</style>
</head>

<body>

<div class="left">
    <div class="left-content">
        <h1>SISTEMA DE VENTAS</h1>
        <p>Controla inventario, ventas y rendimiento de cada PC en tiempo real.</p>
    </div>
</div>

<div class="right">
    <div class="login-box">
        <h2>INICIAR SESIÓN</h2>
        <div class="subtitulo">Accede al panel de ventas e inventario</div>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="input-group">
                <label>Usuario</label>
                <div class="input-wrap">
                    <span>👤</span>
                    <input type="text" name="usuario" placeholder="Ejemplo: PC1" required>
                </div>
            </div>

            <div class="input-group">
                <label>Contraseña</label>
                <div class="input-wrap">
                    <span>🔒</span>
                    <input type="password" name="password" placeholder="Ingresa tu contraseña" required>
                </div>
            </div>

            <button type="submit" class="btn-login">INGRESAR</button>
        </form>
    </div>
</div>

</body>
</html>
