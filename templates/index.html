<!DOCTYPE html>
<html>
<head>
    <title>Sistema de Ventas</title>

<style>
    body {
        font-family: "Agency FB", Arial, sans-serif;
        margin: 0;
        background: #e5e7eb;
        font-weight: 600;
    }

    header {
        background: #1e3a8a;
        color: white;
        padding: 15px 30px;
        display: flex;
        align-items: center;
        box-shadow: 0px 4px 12px rgba(0,0,0,0.25);
    }

    header img {
        height: 50px;
        margin-right: 15px;
    }

    header h1 {
        margin: 0;
        font-size: 24px;
        font-weight: 700;
    }

    .container {
        padding: 25px;
    }

    .grid {
        display: grid;
        grid-template-columns: 1fr 2fr;
        gap: 20px;
    }

    .card {
        background: #f8fafc;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0px 6px 18px rgba(0,0,0,0.1);
    }

    h2 {
        color: #1e3a8a;
        font-size: 18px;
        margin-bottom: 15px;
    }

    .form-row {
        display: flex;
        justify-content: center;
        gap: 10px;
    }

    select, input {
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #cbd5e1;
        background: #f1f5f9;
        font-weight: 600;
    }

    .busqueda-box input {
        width: 70%;
        text-align: center;
    }

    .cantidad-box input {
        width: 200px;
        text-align: center;
    }

    .boton-box {
        display: flex;
        justify-content: center;
        margin-top: 12px;
    }

    .btn-agregar {
        padding: 12px 40px;
        border-radius: 8px;
        background: #1d4ed8;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: 700;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
    }

    th {
        background: #1e3a8a;
        color: white;
        padding: 10px;
    }

    td {
        padding: 8px;
    }

    tr:nth-child(even) {
        background: #eef2ff;
    }

    .btn-finalizar {
        background: #16a34a;
        padding: 10px;
        color: white;
        border: none;
    }

    .btn-yape {
        background: #6d28d9;
        padding: 10px;
        color: white;
        border: none;
    }

    .btn-eliminar {
        background: red;
        color: white;
        border: none;
        padding: 5px;
    }

    .total {
        font-size: 20px;
        margin-top: 10px;
    }

    .botones-pago {
        margin-top: 10px;
        display: flex;
        gap: 10px;
    }

</style>
</head>

<body>

<header>
    <img src="https://yt3.googleusercontent.com/ytc/AIdro_k-fPS9Xt75ReX2p3TPb8kFAOml2N-cvmj7p1e1Q8w05xc=s900-c-k-c0x00ffffff-no-rj">
    <h1>SISTEMA DE VENTAS</h1>
</header>

<div class="container">

<div class="grid">

<!-- 🔥 FILTROS + AGREGAR -->
<div class="card">
    <h2>AGREGAR PRODUCTO</h2>

    <!-- FILTROS -->
    <form method="get">
        <div class="form-row">
            <select name="editorial" onchange="this.form.submit()">
                <option value="">Editorial</option>
                {% for e in editoriales %}
                    <option value="{{ e }}" {% if e == editorial_actual %}selected{% endif %}>{{ e }}</option>
                {% endfor %}
            </select>

            <select name="categoria" onchange="this.form.submit()">
                <option value="">Categoría</option>
                {% for c in categorias %}
                    <option value="{{ c }}" {% if c == categoria_actual %}selected{% endif %}>{{ c }}</option>
                {% endfor %}
            </select>
        </div>
    </form>

    <!-- BUSCAR + AGREGAR -->
    <form action="/agregar" method="post">
        <div class="busqueda-box">
            <input type="text" name="codigo" placeholder="Código o nombre..." required>
        </div>

        <div class="cantidad-box">
            <input type="number" name="cantidad" placeholder="Cantidad" required>
        </div>

        <div class="boton-box">
            <button type="submit" class="btn-agregar">AGREGAR</button>
        </div>
    </form>
</div>

<!-- 🔥 CARRITO -->
<div class="card">
    <h2>CARRITO</h2>

    <table>
        <tr>
            <th>Código</th>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Cantidad</th>
            <th>Subtotal</th>
            <th></th>
        </tr>

        {% for item in carrito %}
        <tr>
            <td>{{ item.codigo }}</td>
            <td>{{ item.nombre }}</td>
            <td>S/ {{ item.precio }}</td>
            <td>{{ item.cantidad }}</td>
            <td>S/ {{ item.subtotal }}</td>
            <td>
                <a href="/eliminar/{{ loop.index0 }}">
                    <button class="btn-eliminar">X</button>
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>

    <div class="total">
        Total: S/ {{ total }}
    </div>

    <div class="botones-pago">
        <a href="/finalizar/efectivo">
            <button class="btn-finalizar">EFECTIVO</button>
        </a>

        <a href="/finalizar/yape">
            <button class="btn-yape">YAPE</button>
        </a>
    </div>

</div>

</div>

<!-- 🔥 INVENTARIO -->
<div class="card">
    <h2>INVENTARIO</h2>
    {{ tabla|safe }}
</div>

</div>

</body>
</html>
