<!DOCTYPE html>
<html>
<head>
    <title>Inventario</title>
    <style>
        body { font-family: Arial; background:#eef2f7; margin:0; }
        header { background:#1e3a8a; color:white; padding:15px; }
        .container { padding:20px; }
        .card { background:white; padding:20px; border-radius:10px; }
        input { padding:10px; margin:5px 0; width:100%; }
        button { padding:10px; background:#2563eb; color:white; border:none; width:100%; }
        table { width:100%; margin-top:20px; border-collapse:collapse; }
        th { background:#1e3a8a; color:white; }
        td, th { padding:8px; text-align:center; }
    </style>
</head>
<body>

<header>
    <h1>📦 INVENTARIO</h1>
</header>

<div class="container">

<div class="card">

<h2>Editar Stock</h2>

<form method="post">
    <input name="codigo" placeholder="Código del producto" required>
    <input name="stock" type="number" placeholder="Nuevo stock" required>
    <button type="submit">Actualizar</button>
</form>

<h2>Lista</h2>
{{ tabla|safe }}

</div>

</div>

</body>
</html>
