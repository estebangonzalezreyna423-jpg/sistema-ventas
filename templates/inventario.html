<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Inventario</title>

<style>
/* TODO TU CSS ORIGINAL + ESTO */
.sugerencias-box {
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 10px;
    max-height: 200px;
    overflow-y: auto;
    margin-top: -8px;
    margin-bottom: 10px;
}

.sugerencia {
    padding: 10px;
    cursor: pointer;
    border-bottom: 1px solid #1e293b;
}

.sugerencia:hover {
    background: #1e293b;
}
</style>

<script>
function toggle(id) {
    document.getElementById("formEditar").classList.add("hidden");
    document.getElementById("formAgregar").classList.add("hidden");
    document.getElementById(id).classList.remove("hidden");
}
</script>

</head>

<body>

<header>
    <h1>INVENTARIO</h1>

    <div class="header-actions">
        <span>Usuario: {{ usuario }}</span>
        <a href="/" class="btn-volver">⬅ Volver</a>
        <a href="/descargar_inventario" class="btn-excel">Descargar Excel</a>
    </div>
</header>

<div class="container">

<div class="card">

{% if usuario == "PC1" %}

<button class="btn btn-toggle" onclick="toggle('formEditar')">
    Editar Stock
</button>

<button class="btn btn-toggle" onclick="toggle('formAgregar')">
    Agregar / Eliminar Libro
</button>

{% else %}
<p class="aviso">Solo PC1 puede modificar inventario</p>
{% endif %}

</div>

<!-- EDITAR -->
<div id="formEditar" class="card hidden">

<h2>Editar Stock / Precio</h2>

<form method="POST" action="/inventario/actualizar">

    <!-- BUSCADOR -->
    <input type="text" id="busquedaLibro" placeholder="Buscar libro por nombre o código">

    <input type="hidden" name="codigo" id="codigoSeleccionado">

    <div id="sugerencias" class="sugerencias-box"></div>

    <input type="number" name="stock" placeholder="Nuevo stock">
    <input type="number" name="precio" placeholder="Nuevo precio">

    <button type="submit" class="btn btn-editar">Actualizar</button>
</form>

</div>

<!-- AGREGAR -->
<div id="formAgregar" class="card hidden">

<h2>Agregar Libro</h2>

<form method="POST" action="/inventario/agregar">

<div class="form-grid">
    <input type="text" name="codigo" placeholder="Código" required>
    <input type="text" name="nombre" placeholder="Nombre del libro" required>

    <input type="number" name="precio" placeholder="Precio" required>
    <input type="number" name="stock" placeholder="Stock inicial" required>

    <input type="text" name="categoria" placeholder="Categoría">
    <input type="text" name="editorial" placeholder="Editorial">
</div>

<button type="submit" class="btn btn-agregar">Agregar Libro</button>

</form>

<hr>

<h3>Eliminar Libro</h3>

<form method="POST" action="/inventario/eliminar">
    <input type="text" name="codigo" placeholder="Código del libro" required>
    <button type="submit" class="btn btn-eliminar">Eliminar Libro</button>
</form>

</div>

<!-- TABLA -->
<div class="card">
<h2>Lista de productos</h2>

<div class="tabla-scroll">
    {{ tabla|safe }}
</div>

</div>

</div>

<!-- 🔥 SCRIPT BUSCADOR -->
<script>
const libros = {{ libros_inventario | tojson }};
const input = document.getElementById("busquedaLibro");
const box = document.getElementById("sugerencias");
const codigoInput = document.getElementById("codigoSeleccionado");

input.addEventListener("input", () => {
    const valor = input.value.toLowerCase();
    box.innerHTML = "";

    if (valor.length < 2) return;

    const resultados = libros.filter(l =>
        l.codigo.toLowerCase().includes(valor) ||
        l.nombre.toLowerCase().includes(valor)
    );

    resultados.slice(0, 10).forEach(libro => {
        const div = document.createElement("div");
        div.classList.add("sugerencia");
        div.textContent = `${libro.codigo} - ${libro.nombre}`;

        div.onclick = () => {
            input.value = libro.nombre;
            codigoInput.value = libro.codigo;
            box.innerHTML = "";
        };

        box.appendChild(div);
    });
});
</script>

</body>
</html>
