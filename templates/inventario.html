<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Inventario</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #e5e7eb;
}

/* HEADER */
header {
    background: rgba(15, 23, 42, 0.95);
    color: white;
    padding: 26px 35px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h1 {
    margin: 0;
    font-size: 34px;
    letter-spacing: 1px;
}

.header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
}

/* LAYOUT */
.container { padding: 30px; }

.card {
    background: rgba(30, 41, 59, 0.92);
    padding: 25px;
    border-radius: 18px;
    margin-bottom: 20px;
    border: 1px solid rgba(148, 163, 184, 0.18);
    box-shadow: 0 18px 40px rgba(0,0,0,0.28);
}

/* PANEL PROFESIONAL */
.panel-acciones {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 25px;
    background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.18), transparent 35%),
        linear-gradient(135deg, rgba(37, 99, 235, 0.18), rgba(15, 23, 42, 0.95));
    border: 1px solid rgba(56, 189, 248, 0.25);
}

.panel-acciones h2 {
    margin: 0 0 8px 0;
    font-size: 25px;
    color: #f8fafc;
}

.panel-acciones p {
    margin: 0;
    color: #94a3b8;
    font-size: 15px;
}

.acciones-botones {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}

/* BOTONES */
.btn {
    padding: 12px 16px;
    border-radius: 12px;
    color: white;
    text-decoration: none;
    font-weight: 700;
    border: none;
    cursor: pointer;
    transition: 0.25s;
}

.btn:hover {
    transform: translateY(-2px);
    filter: brightness(1.08);
}

.btn-toggle {
    background: linear-gradient(135deg, #f59e0b, #ea580c);
    box-shadow: 0 8px 18px rgba(245, 158, 11, 0.22);
}

.btn-editar { background: #16a34a; }
.btn-agregar { background: #2563eb; }
.btn-eliminar { background: #dc2626; }
.btn-volver { background: #2563eb; }
.btn-excel { background: #22c55e; }

/* INPUTS */
input {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 10px;
    border: 1px solid #334155;
    background: #0f172a;
    color: white;
}

/* GRID */
.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.hidden { display: none; }

/* TABLA */
.tabla-scroll { overflow-x: auto; }

table { width: 100%; border-collapse: collapse; }

th {
    background: #0f172a;
    color: white;
    padding: 10px;
}

td {
    padding: 10px;
    text-align: center;
}

tr:nth-child(even) { background: #1e293b; }

/* BUSCADOR */
.sugerencias-box {
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 10px;
    max-height: 200px;
    overflow-y: auto;
}

.sugerencia {
    padding: 10px;
    cursor: pointer;
}

.sugerencia:hover {
    background: #1e293b;
}

@media (max-width: 768px) {
    header {
        flex-direction: column;
        gap: 15px;
        text-align: center;
    }

    .header-actions {
        flex-wrap: wrap;
        justify-content: center;
    }

    .panel-acciones {
        flex-direction: column;
        align-items: flex-start;
    }

    .acciones-botones,
    .acciones-botones .btn {
        width: 100%;
    }

    .form-grid {
        grid-template-columns: 1fr;
    }
}
</style>

<script>
function toggle(id) {
    document.getElementById("formEditar").classList.add("hidden");
    document.getElementById("formAgregar").classList.add("hidden");
    document.getElementById(id).classList.remove("hidden");
}
</script>

</head>

<body>

<header>
    <h1>INVENTARIO</h1>
    <div class="header-actions">
        <span>Usuario: {{ usuario }}</span>
        <a href="/" class="btn btn-volver">Volver</a>
        <a href="/descargar_inventario" class="btn btn-excel">Excel</a>
    </div>
</header>

<div class="container">

<div class="card panel-acciones">
    <div>
        <h2>Gestión de inventario</h2>
        <p>Administra el stock, precios y libros registrados en el sistema.</p>
    </div>

    <div class="acciones-botones">
        {% if usuario == "PC1" %}
        <button class="btn btn-toggle" onclick="toggle('formEditar')">📦 Editar Stock</button>
        <button class="btn btn-toggle" onclick="toggle('formAgregar')">➕ Agregar / Eliminar</button>
        {% endif %}
    </div>
</div>

<!-- EDITAR -->
<div id="formEditar" class="card hidden">

<h2>Editar Stock</h2>

<form method="POST" action="/inventario/actualizar">

<input type="text" id="busquedaLibro" placeholder="Buscar libro...">
<input type="hidden" name="codigo" id="codigoSeleccionado">

<div id="sugerencias" class="sugerencias-box"></div>

<input type="number" name="stock" placeholder="Nuevo stock">
<input type="number" name="precio" placeholder="Nuevo precio">

<button class="btn btn-editar">Actualizar</button>

</form>

</div>

<!-- AGREGAR -->
<div id="formAgregar" class="card hidden">

<h2>Agregar Libro</h2>

<form method="POST" action="/inventario/agregar">

<div class="form-grid">
<input type="text" name="codigo" placeholder="Código">
<input type="text" name="nombre" placeholder="Nombre">

<input type="number" name="precio" placeholder="Precio">
<input type="number" name="stock" placeholder="Stock">

<input type="text" name="categoria" placeholder="Categoría">
<input type="text" name="editorial" placeholder="Editorial">
</div>

<button class="btn btn-agregar">Agregar</button>

</form>

<hr>

<form method="POST" action="/inventario/eliminar">

<input type="text" id="busquedaEliminar" name="codigo" placeholder="Buscar libro...">

<div id="sugerenciasEliminar" class="sugerencias-box"></div>

<button class="btn btn-eliminar">Eliminar</button>

</form>

</div>

<!-- TABLA -->
<div class="card">
<h2>Lista</h2>

<div class="tabla-scroll">
{{ tabla|safe }}
</div>

</div>

</div>

<script>
const libros = {{ libros_inventario | tojson }};

/* EDITAR */
const input = document.getElementById("busquedaLibro");
const box = document.getElementById("sugerencias");
const codigoInput = document.getElementById("codigoSeleccionado");

input.addEventListener("input", () => {
    const v = input.value.toLowerCase();
    box.innerHTML = "";

    if (v.length < 2) return;

    libros.filter(l =>
        l.codigo.toLowerCase().includes(v) ||
        l.nombre.toLowerCase().includes(v)
    ).slice(0,10).forEach(l => {

        const div = document.createElement("div");
        div.className = "sugerencia";
        div.textContent = l.codigo + " - " + l.nombre;

        div.onclick = () => {
            input.value = l.nombre;
            codigoInput.value = l.codigo;
            box.innerHTML = "";
        };

        box.appendChild(div);
    });
});

/* ELIMINAR */
const inputE = document.getElementById("busquedaEliminar");
const boxE = document.getElementById("sugerenciasEliminar");

inputE.addEventListener("input", () => {
    const v = inputE.value.toLowerCase();
    boxE.innerHTML = "";

    if (v.length < 2) return;

    libros.filter(l =>
        l.codigo.toLowerCase().includes(v) ||
        l.nombre.toLowerCase().includes(v)
    ).slice(0,10).forEach(l => {

        const div = document.createElement("div");
        div.className = "sugerencia";
        div.textContent = l.codigo + " - " + l.nombre;

        div.onclick = () => {
            inputE.value = l.codigo;
            boxE.innerHTML = "";
        };

        boxE.appendChild(div);
    });
});
</script>

</body>
</html>
